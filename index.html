<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="读书笔记">
<meta name="theme-color" content="#1a1510">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>读书笔记</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf6ef;
    --paper2: #f3ede2;
    --ink: #1a1510;
    --ink-light: #5a4e3c;
    --ink-faint: #b8a98a;
    --red: #c0392b;
    --red-light: rgba(192,57,43,0.08);
    --gold: #a0793a;
    --gold-light: rgba(160,121,58,0.12);
    --border: #ddd4c0;
    --dark: #1a1510;
    --dark2: #252018;
    --shadow: rgba(26,21,16,0.1);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--paper2);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    user-select: none;
  }

  /* ══════════════════════════════
     APP SHELL — 3 views
  ══════════════════════════════ */
  .view { display: none; flex-direction: column; height: 100%; }
  .view.active { display: flex; }

  /* ── Top bar ── */
  .topbar {
    background: var(--dark);
    color: #f0e8d8;
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
  }

  .topbar-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
    flex: 1;
  }

  .topbar-sub {
    font-size: 13px;
    color: #f0e8d8;
    flex: 1;
    letter-spacing: 0.05em;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .icon-btn {
    width: 36px; height: 36px;
    border: none;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #f0e8d8;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .icon-btn:active { background: rgba(255,255,255,0.15); }

  /* ── Bottom nav ── */
  .bottom-nav {
    background: var(--dark);
    display: flex;
    padding-bottom: var(--safe-bottom);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .nav-item {
    flex: 1;
    padding: 10px 0 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
    border: none;
    background: transparent;
  }

  .nav-item:active { opacity: 0.6; }

  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 10px; color: rgba(200,180,150,0.45); letter-spacing: 0.08em; }
  .nav-item.active .nav-label { color: var(--red); }
  .nav-item.active .nav-icon { filter: drop-shadow(0 0 4px rgba(192,57,43,0.5)); }

  /* ════════════
     VIEW 1: 书架
  ════════════ */
  #viewShelf { background: var(--paper2); }

  .shelf-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px calc(16px + var(--safe-bottom));
  }

  .shelf-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--ink-faint);
  }

  .shelf-empty-icon { font-size: 52px; opacity: 0.4; }
  .shelf-empty h3 { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 400; }
  .shelf-empty p { font-size: 13px; line-height: 1.8; text-align: center; }

  .book-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .book-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .book-card:active { transform: scale(0.97); }

  .book-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--red);
  }

  .book-card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-card-author {
    font-size: 12px;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }

  .book-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--gold-light);
    color: var(--gold);
    border: 1px solid rgba(160,121,58,0.2);
    letter-spacing: 0.05em;
  }

  .mini-stars { font-size: 11px; color: var(--gold); letter-spacing: -1px; }

  /* FAB */
  .fab {
    position: fixed;
    right: 20px;
    bottom: calc(70px + var(--safe-bottom));
    width: 56px; height: 56px;
    background: var(--red);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(192,57,43,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 20;
  }
  .fab:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(192,57,43,0.3); }

  /* ════════════
     VIEW 2: 笔记详情
  ════════════ */
  #viewNote { background: var(--paper2); }

  .note-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px calc(20px + var(--safe-bottom));
  }

  .note-meta-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .note-book-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
    border: none;
    background: transparent;
    outline: none;
    width: 100%;
    user-select: text;
  }

  .note-book-author {
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 14px;
    border: none;
    background: transparent;
    outline: none;
    width: 100%;
    user-select: text;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stars-input { display: flex; gap: 2px; }
  .star { font-size: 22px; cursor: pointer; transition: transform 0.1s; }
  .star:active { transform: scale(1.3); }

  .status-pill {
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--paper2);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    color: var(--ink-light);
    outline: none;
    cursor: pointer;
  }

  /* Section cards */
  .section-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .section-head {
    padding: 12px 16px;
    background: var(--paper2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--ink-light);
    font-weight: 500;
    letter-spacing: 0.1em;
  }

  .section-textarea {
    width: 100%;
    min-height: 90px;
    padding: 14px 16px;
    border: none;
    background: transparent;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    resize: none;
    line-height: 1.9;
    letter-spacing: 0.03em;
    user-select: text;
  }

  .section-textarea::placeholder { color: var(--ink-faint); font-style: italic; }

  /* Highlights */
  .hl-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }

  .hl-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 12px;
    background: #fffdf7;
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--ink-light);
    line-height: 1.8;
  }

  .hl-del {
    background: none; border: none;
    color: var(--ink-faint); font-size: 14px;
    cursor: pointer; flex-shrink: 0;
    padding: 2px 4px; line-height: 1;
  }

  .hl-add-row {
    display: flex; gap: 8px;
    padding: 8px 14px 14px;
  }

  .hl-input {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--paper2);
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    user-select: text;
  }

  .hl-btn {
    padding: 9px 14px;
    background: var(--gold-light);
    border: 1px solid rgba(160,121,58,0.3);
    border-radius: 8px;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Tags */
  .tags-area {
    padding: 12px 14px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .tag {
    padding: 5px 10px;
    background: var(--gold-light);
    border: 1px solid rgba(160,121,58,0.25);
    border-radius: 12px;
    font-size: 12px;
    color: var(--gold);
    display: flex; align-items: center; gap: 4px;
  }

  .tag-del { background: none; border: none; color: rgba(160,121,58,0.5); cursor: pointer; font-size: 13px; }

  .tag-input {
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 5px 10px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    background: transparent;
    color: var(--ink);
    outline: none;
    width: 80px;
    user-select: text;
  }

  .save-bar {
    text-align: center;
    font-size: 11px;
    color: var(--ink-faint);
    padding: 8px;
    letter-spacing: 0.05em;
    height: 28px;
  }

  /* ════════════
     VIEW 3: 统计
  ════════════ */
  #viewStats { background: var(--paper2); }

  .stats-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px calc(20px + var(--safe-bottom));
  }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .stat-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px;
    text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .stat-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.08em; }

  .recent-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
    margin-bottom: 14px;
  }

  .recent-head {
    padding: 12px 16px;
    background: var(--paper2);
    border-bottom: 1px solid var(--border);
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--ink-light);
    letter-spacing: 0.1em;
  }

  .recent-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .recent-item:last-child { border-bottom: none; }
  .recent-item:active { background: var(--paper2); }

  .recent-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  .recent-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--ink);
    flex: 1;
  }

  .recent-stars { font-size: 11px; color: var(--gold); }

  /* ══════════
     MODAL
  ══════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,21,16,0.6);
    z-index: 100;
    display: flex; align-items: flex-end;
    backdrop-filter: blur(4px);
  }

  .modal-sheet {
    background: var(--paper);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    width: 100%;
    animation: slideUp 0.3s ease;
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .modal-sub { font-size: 13px; color: var(--ink-faint); margin-bottom: 20px; }

  .modal-input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    background: var(--paper2);
    color: var(--ink);
    outline: none;
    margin-bottom: 10px;
    user-select: text;
  }

  .modal-btns { display: flex; gap: 10px; margin-top: 16px; }

  .btn-primary {
    flex: 1; padding: 14px;
    background: var(--red);
    color: #fff; border: none;
    border-radius: 10px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px; cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  .btn-primary:active { background: #a93226; }

  .btn-cancel {
    flex: 1; padding: 14px;
    background: var(--paper2); color: var(--ink-light);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px; cursor: pointer;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Install banner */
  .install-banner {
    position: fixed;
    top: calc(var(--safe-top) + 60px);
    left: 12px; right: 12px;
    background: var(--dark);
    color: #f0e8d8;
    padding: 12px 16px;
    border-radius: 12px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 50;
    animation: fadeIn 0.4s ease;
    font-size: 13px;
    line-height: 1.5;
  }

  .install-banner-icon { font-size: 24px; flex-shrink: 0; }
  .install-banner-text { flex: 1; }
  .install-banner-close {
    background: none; border: none; color: rgba(200,180,150,0.5);
    font-size: 18px; cursor: pointer; flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- ══ VIEW 1: 书架 ══ -->
<div class="view active" id="viewShelf">
  <div class="topbar">
    <div class="topbar-title">📚 读书笔记</div>
    <button class="icon-btn" onclick="showSearch()" title="搜索">🔍</button>
  </div>
  <div class="shelf-scroll" id="shelfScroll">
    <div class="shelf-empty" id="shelfEmpty">
      <div class="shelf-empty-icon">📖</div>
      <h3>书架空空如也</h3>
      <p>点击右下角的 ＋ 按钮<br>开始记录第一本书</p>
    </div>
    <div class="book-grid" id="bookGrid" style="display:none"></div>
  </div>
  <button class="fab" onclick="openNewModal()">＋</button>
  <div class="bottom-nav">
    <button class="nav-item active" onclick="goView('shelf')">
      <span class="nav-icon">📚</span>
      <span class="nav-label">书架</span>
    </button>
    <button class="nav-item" onclick="goView('stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">统计</span>
    </button>
  </div>
</div>

<!-- ══ VIEW 2: 笔记 ══ -->
<div class="view" id="viewNote">
  <div class="topbar">
    <button class="icon-btn" onclick="goView('shelf')">←</button>
    <div class="topbar-sub" id="noteTopTitle">笔记</div>
    <button class="icon-btn" onclick="deleteCurrentNote()" title="删除">🗑</button>
  </div>
  <div class="note-scroll" id="noteScroll">
    <!-- filled dynamically -->
  </div>
</div>

<!-- ══ VIEW 3: 统计 ══ -->
<div class="view" id="viewStats">
  <div class="topbar">
    <div class="topbar-title">📊 阅读统计</div>
  </div>
  <div class="stats-scroll" id="statsScroll"></div>
  <div class="bottom-nav">
    <button class="nav-item" onclick="goView('shelf')">
      <span class="nav-icon">📚</span>
      <span class="nav-label">书架</span>
    </button>
    <button class="nav-item active" onclick="goView('stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">统计</span>
    </button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">新建读书笔记</div>
    <div class="modal-sub">输入书名与作者，开始你的阅读记录</div>
    <input class="modal-input" id="mTitle" placeholder="书名 *" />
    <input class="modal-input" id="mAuthor" placeholder="作者（可选）" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('modal').style.display='none'">取消</button>
      <button class="btn-primary" onclick="createNote()">创建</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let notes = [];
let activeId = null;
const STORAGE_KEY = 'dushu_pwa_v1';
let saveTimer = null;

// ── Storage (localStorage fallback) ──
async function loadNotes() {
  try {
    if (window.storage) {
      const r = await window.storage.get(STORAGE_KEY);
      if (r && r.value) { notes = JSON.parse(r.value); }
    } else {
      const s = localStorage.getItem(STORAGE_KEY);
      if (s) notes = JSON.parse(s);
    }
  } catch(e) { notes = []; }
  renderShelf();
}

async function persistNotes() {
  const data = JSON.stringify(notes);
  try {
    if (window.storage) await window.storage.set(STORAGE_KEY, data);
    else localStorage.setItem(STORAGE_KEY, data);
    setSaveBar('已自动保存 ✓');
  } catch(e) { setSaveBar('保存失败'); }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistNotes, 1000);
}

// ── View routing ──
function goView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  if (name === 'shelf') {
    document.getElementById('viewShelf').classList.add('active');
    renderShelf();
  } else if (name === 'note') {
    document.getElementById('viewNote').classList.add('active');
  } else if (name === 'stats') {
    document.getElementById('viewStats').classList.add('active');
    renderStats();
  }
}

// ── Shelf ──
function renderShelf(filter) {
  const list = filter ? notes.filter(n =>
    n.title.includes(filter) || (n.author||'').includes(filter)
  ) : notes;

  const empty = document.getElementById('shelfEmpty');
  const grid = document.getElementById('bookGrid');

  if (list.length === 0) {
    empty.style.display = 'flex';
    grid.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = list.map(n => `
    <div class="book-card" onclick="openNote('${n.id}')">
      <div class="book-card-title">${esc(n.title)}</div>
      <div class="book-card-author">${esc(n.author || '佚名')}</div>
      <div class="book-card-footer">
        <span class="status-badge">${n.status || '阅读中'}</span>
        <span class="mini-stars">${'★'.repeat(n.rating||0)}${'☆'.repeat(5-(n.rating||0))}</span>
      </div>
    </div>
  `).join('');
}

function showSearch() {
  const q = prompt('搜索书名或作者：');
  if (q !== null) renderShelf(q.trim());
}

// ── Modal ──
function openNewModal() {
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('mTitle').focus(), 300);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').style.display = 'none';
}

function createNote() {
  const title = document.getElementById('mTitle').value.trim();
  if (!title) { document.getElementById('mTitle').focus(); return; }
  const note = {
    id: Date.now().toString(),
    title,
    author: document.getElementById('mAuthor').value.trim(),
    rating: 0,
    status: '阅读中',
    summary: '',
    thoughts: '',
    highlights: [],
    tags: [],
    created: new Date().toLocaleDateString('zh-CN')
  };
  notes.unshift(note);
  document.getElementById('modal').style.display = 'none';
  document.getElementById('mTitle').value = '';
  document.getElementById('mAuthor').value = '';
  persistNotes();
  openNote(note.id);
}

// ── Note editor ──
function openNote(id) {
  activeId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;
  document.getElementById('noteTopTitle').textContent = note.title;
  renderNoteEditor(note);
  goView('note');
}

function renderNoteEditor(note) {
  const scroll = document.getElementById('noteScroll');
  scroll.innerHTML = `
    <div class="note-meta-card">
      <input class="note-book-title" id="eTitle" value="${esc(note.title)}" placeholder="书名" oninput="upField('title')" />
      <input class="note-book-author" id="eAuthor" value="${esc(note.author)}" placeholder="作者" oninput="upField('author')" />
      <div class="meta-row">
        <div class="stars-input" id="starsEl">${renderStars(note.rating)}</div>
        <select class="status-pill" id="eStatus" onchange="upField('status')">
          ${['想读','阅读中','已读','搁置'].map(s=>`<option ${note.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="section-card">
      <div class="section-head"><span>📖</span> 内容摘要</div>
      <textarea class="section-textarea" id="eSummary" placeholder="用自己的话概括这本书的核心内容…" oninput="upField('summary')">${esc(note.summary)}</textarea>
    </div>

    <div class="section-card">
      <div class="section-head"><span>💡</span> 读后感悟</div>
      <textarea class="section-textarea" id="eThoughts" placeholder="这本书给你带来了什么启发？有哪些观点让你印象深刻？" oninput="upField('thoughts')">${esc(note.thoughts)}</textarea>
    </div>

    <div class="section-card">
      <div class="section-head"><span>✏️</span> 精彩摘录</div>
      <div class="hl-list" id="hlList">${renderHLs(note.highlights)}</div>
      <div class="hl-add-row">
        <input class="hl-input" id="hlInput" placeholder="输入摘录…" onkeydown="if(event.key==='Enter')addHL()" />
        <button class="hl-btn" onclick="addHL()">＋</button>
      </div>
    </div>

    <div class="section-card">
      <div class="section-head"><span>🏷️</span> 标签</div>
      <div class="tags-area" id="tagsArea">
        ${renderTags(note.tags)}
        <input class="tag-input" id="tagInput" placeholder="添加…" onkeydown="tagKD(event)" />
      </div>
    </div>

    <div class="save-bar" id="saveBar"></div>
  `;

  // auto-resize textareas
  ['eSummary','eThoughts'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
  });
}

function renderStars(r) {
  return [1,2,3,4,5].map(i =>
    `<span class="star" onclick="setRating(${i})">${i<=r?'★':'☆'}</span>`
  ).join('');
}

function renderHLs(list) {
  return (list||[]).map((h,i) => `
    <div class="hl-item">
      <span style="flex:1">${esc(h)}</span>
      <button class="hl-del" onclick="removeHL(${i})">✕</button>
    </div>`).join('');
}

function renderTags(tags) {
  return (tags||[]).map((t,i) => `
    <div class="tag">${esc(t)}<button class="tag-del" onclick="removeTag(${i})">✕</button></div>
  `).join('');
}

function upField(field) {
  const note = notes.find(n => n.id === activeId); if (!note) return;
  if (field==='title') { note.title = document.getElementById('eTitle').value; document.getElementById('noteTopTitle').textContent = note.title; }
  if (field==='author') note.author = document.getElementById('eAuthor').value;
  if (field==='summary') { note.summary = document.getElementById('eSummary').value; autoResize('eSummary'); }
  if (field==='thoughts') { note.thoughts = document.getElementById('eThoughts').value; autoResize('eThoughts'); }
  if (field==='status') note.status = document.getElementById('eStatus').value;
  scheduleSave();
}

function autoResize(id) {
  const el = document.getElementById(id);
  if (el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
}

function setRating(r) {
  const note = notes.find(n => n.id === activeId); if (!note) return;
  note.rating = note.rating === r ? 0 : r;
  document.getElementById('starsEl').innerHTML = renderStars(note.rating);
  scheduleSave();
}

function addHL() {
  const inp = document.getElementById('hlInput');
  const val = inp.value.trim(); if (!val) return;
  const note = notes.find(n => n.id === activeId);
  note.highlights.push(val); inp.value = '';
  document.getElementById('hlList').innerHTML = renderHLs(note.highlights);
  scheduleSave();
}

function removeHL(i) {
  const note = notes.find(n => n.id === activeId);
  note.highlights.splice(i,1);
  document.getElementById('hlList').innerHTML = renderHLs(note.highlights);
  scheduleSave();
}

function tagKD(e) {
  if (e.key==='Enter'||e.key===',') { e.preventDefault(); addTag(e.target.value.trim()); }
}

function addTag(val) {
  const note = notes.find(n => n.id === activeId);
  if (!val || note.tags.includes(val)) return;
  note.tags.push(val);
  const area = document.getElementById('tagsArea');
  area.innerHTML = renderTags(note.tags) + `<input class="tag-input" id="tagInput" placeholder="添加…" onkeydown="tagKD(event)" />`;
  scheduleSave();
}

function removeTag(i) {
  const note = notes.find(n => n.id === activeId);
  note.tags.splice(i,1);
  const area = document.getElementById('tagsArea');
  area.innerHTML = renderTags(note.tags) + `<input class="tag-input" id="tagInput" placeholder="添加…" onkeydown="tagKD(event)" />`;
  scheduleSave();
}

function deleteCurrentNote() {
  if (!confirm('确定删除这条笔记吗？')) return;
  notes = notes.filter(n => n.id !== activeId);
  activeId = null;
  persistNotes();
  goView('shelf');
}

function setSaveBar(msg) {
  const el = document.getElementById('saveBar');
  if (el) el.textContent = msg;
  setTimeout(() => { const e2 = document.getElementById('saveBar'); if(e2) e2.textContent=''; }, 2500);
}

// ── Stats ──
function renderStats() {
  const total = notes.length;
  const read = notes.filter(n => n.status==='已读').length;
  const reading = notes.filter(n => n.status==='阅读中').length;
  const hlCount = notes.reduce((s,n) => s + (n.highlights||[]).length, 0);
  const avgRating = total ? (notes.reduce((s,n)=>s+(n.rating||0),0)/total).toFixed(1) : '—';
  const recent = [...notes].slice(0,5);

  document.getElementById('statsScroll').innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">总书目</div></div>
      <div class="stat-card"><div class="stat-num">${read}</div><div class="stat-label">已读完</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${reading}</div><div class="stat-label">阅读中</div></div>
      <div class="stat-card"><div class="stat-num">${hlCount}</div><div class="stat-label">摘录数</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-card" style="grid-column:1/-1"><div class="stat-num" style="font-size:28px">${avgRating}</div><div class="stat-label">平均评分</div></div>
    </div>
    ${recent.length ? `
    <div class="recent-card">
      <div class="recent-head">最近笔记</div>
      ${recent.map(n => `
        <div class="recent-item" onclick="openNote('${n.id}')">
          <div class="recent-dot"></div>
          <div class="recent-title">${esc(n.title)}</div>
          <div class="recent-stars">${'★'.repeat(n.rating||0)}</div>
        </div>
      `).join('')}
    </div>` : ''}
  `;
}

// ── PWA install ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  const banner = document.createElement('div');
  banner.className = 'install-banner';
  banner.innerHTML = `
    <span class="install-banner-icon">📲</span>
    <span class="install-banner-text">将读书笔记添加到主屏幕，随时离线使用</span>
    <button onclick="installApp()" style="background:var(--red);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;flex-shrink:0">安装</button>
    <button class="install-banner-close" onclick="this.parentElement.remove()">✕</button>
  `;
  document.body.appendChild(banner);
  setTimeout(() => { if (banner.parentElement) banner.remove(); }, 8000);
}

function installApp() {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
loadNotes();
</script>
</body>
</html>
